<!DOCTYPE html>
<html>
<head>
<style>
body{
  background-color: lightblue;
}
#main{
  background-color: black;
  display: grid;
  grid-template-columns: auto auto auto auto;
  grid-gap: 20px;
  padding: 30px;
}
div button{
  font-size: 30px;
  padding: 10px;
  font-weight: bold;
}
button:hover{
  background-color: gray;
  color: white;
  border: none;
}
#it{
  grid-column-start: 1;
  grid-column-end:5 ;
  background-color:darkorange;
  color: white;
  padding: 0;
  font-size: 50px;
  border: none;
}
#top{
  grid-column-start: 1;
  grid-column-end: 5;
  padding: 30px;
}
#C{
  background-color: red;
  color:white ;
  border: none;
}

</style>
</head>
<body>
 <div id="main">
   <input type="text" id="top" readonly="">
   <button>7</button>
   <button>8</button>
   <button>9</button>
   <button>/</button>
   <button>4</button>
   <button>5</button>
   <button>6</button>
   <button>×</button>
   <button>1</button>
   <button onclick="itis('6')" >2</button>
   <button>3</button>
   <button>-</button>
   <button>.</button>
   <button>0</button>
   <button>+</button>
   <button id="C">C</button>
   <button id="it">=</button>
 </div>
 <h1 id="lal"></h1>
 <button onclick="ban()">click</button>
 <script>
   let kill = document.getElementById('top');
   function itis(input){
     kill.value += input;
   }
   let x,y,z;
   x = 13;
   y = 44;
   z = x + y;
   function ban(){
   document.getElementById('lal').innertext = z;
   }
 </script>
</body>
</html>
