<!DOCTYPE html>
<html>
<head>
<title>
</title>
</head>
<style>
input{
  margin: 20px;
}
</style>
<body>
  <input type="text" id="put" placeholder="enter a word">
  <input type="text" id="tput" placeholder="enter meaning">
  <button onclick="toAdd()">Add word</button>
  <input type="text" id="search" placeholder="search word">
  <button onclick="sear()">Search</button>
  <p id="show"></p>
<script>
 const x = new Map();
 function toAdd(){
   let pot = document.getElementById("put").value;
   let tpot = document.getElementById("tput").value;
   if(pot === "" || tpot === ""){
     alert("please enter word and meaning")
   }else{
    x.set(pot,tpot);
   }
   alert("the word " + pot +  " was saved")
   document.getElementById("put").value = " ";
   document.getElementById("tput").value = " ";
 }
 function sear(){
  const sad = document.getElementById("search").value;
   if(x.has(sad)){
     document.getElementById("show").innerHTML = x.get(sad) + " is the word you searched";
   }else{
     document.getElementById("show").innerHTML = "the word was not found";
   }
 }
</script>
</body>
</html>
