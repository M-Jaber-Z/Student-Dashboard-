<!DOCTYPE html>
<html>
  <head>
    <title>pic.com</title>
    <style>
      body{
        background-color: black;
        display: flex;
        justify-content: center;
        margin-top: 40%;
      }
      @media (max-width: 1000px) {
        body{
          background-color:red;
        }
      }
        }
      input{
        margin: 10px;
        margin-left: 0;
        height: 30px;
        width: 95%;
        border-radius: 20px;
      }
      input:hover{
        background-color:white;
        border: none;
      }
      h1{
        text-align: center;
      }
      div{
        color: white;
        background-color: gray;
        border: none;
        border-radius: 20px;
        padding: 10px;
        width: 80%;
        height: 80%;
      }
      #main{
        border: solid 15px yellow;
        outline: solid 7px lightgray;
        outline-offset: 10px;
      }
      #sec{
        display: flex;
        justify-content: space-around;
      }
      #big{
        width: 95%;
        background-color: lightblue;
        border: none;
        border-radius: 30px;
        height: 30px;
      }
      #big:active{
        background-color: aqua;
      }
      #last{
        background-color: brown;
        border-radius: 10px;
        border: none;
        height: 30px;
        width: 80px;
      }
      #last:active{
        background-color:brown;
        border: none;
        border-radius: 40px;
      }
    </style>
  </head>
  <body>
    <div id="main">
      <h1>login here</h1>
      <form>
        <label>username</label><br>
        <input type="text" placeholder="Emali or phone"><br>
        <label>password</label><br>
        <input type="password" placeholder="password" required=""><br>
        <button id="big">log in</button>
        <div id="sec" style="margin-top:10px">
          <button id="last">google</button>
          <button id="last">facebook</button>
        </div>
      </form>
    </div>
  </body>
</html>
